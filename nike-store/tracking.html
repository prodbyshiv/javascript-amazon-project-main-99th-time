<!DOCTYPE html>
<html>

<head>
    <title>Tracking - Nike</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/shared/general.css">
    <link rel="stylesheet" href="styles/shared/nike-header.css">
    <link rel="stylesheet" href="styles/pages/tracking.css">
</head>

<body>
    <div class="nike-header">
        <div class="nike-header-left-section">
            <a href="nike.html" class="header-link">
                <span class="nike-logo" style="font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:900;font-size:28px;letter-spacing:2px;color:#111;text-decoration:none;">NIKE</span>
                <span class="nike-mobile-logo" style="font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:900;font-size:22px;letter-spacing:2px;color:#111;text-decoration:none;">NIKE</span>
            </a>
        </div>

        <div class="nike-header-middle-section">
            <input class="search-bar" type="text" placeholder="Search">
        </div>

        <div class="nike-header-right-section">
            <a class="nav-link header-link" href="orders.html">Orders</a>

            <a class="bag-link header-link" href="checkout.html">
                <img class="bag-icon" src="images/icons/bag-icon.svg">
                <div class="bag-quantity">0</div>
            </a>
        </div>
    </div>

    <div class="main">
        <div class="order-tracking">
            <a class="back-to-orders-link link-primary" href="orders.html">
                View all orders
            </a>

            <div class="delivery-date">
                Arriving on Monday, April 7
            </div>

            <div class="product-info">
                Nike Dunk Low Retro
            </div>

            <div class="product-info">
                Quantity: 1
            </div>

            <img class="product-image" src="images/products/dunk-low-retro.png">

            <div class="progress-labels-container">
                <div class="progress-label">
                    Preparing
                </div>
                <div class="progress-label current-status">
                    Shipped
                </div>
                <div class="progress-label">
                    Delivered
                </div>
            </div>

            <div class="progress-bar-container">
                <div class="progress-bar"></div>
            </div>
        </div>
    </div>
</body>

</html>
